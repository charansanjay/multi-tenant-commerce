name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  NODE_VERSION: "24.6.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Quality checks + Unit/Integration
  # ─────────────────────────────────────────
  unit-integration:
    name: Type-check, Lint, Unit & Integration Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Run unit and integration tests
        run: pnpm --filter @platform/admin test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: coverage-report
          path: apps/admin/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────
  # Job 2 — E2E Tests (runs after Job 1)
  # ─────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-integration
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @platform/admin exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Reset database with migrations
        run: supabase db reset

      - name: Create environment file
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> apps/admin/.env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> apps/admin/.env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> apps/admin/.env.local

      - name: Run E2E tests
        run: pnpm --filter @platform/admin exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
